name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Matches engines.node in package.json (>=16.0.0)
        node-version: [16, 18, 20, 22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run build

  lint:
    name: lint
    runs-on: ubuntu-latest
    # ESLint 10 requires Node >=20.19, 22.13, or >=24
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
